<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tagalog Teacher Proposal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card-container" id="main-card">
        <!-- Interactive Graphic View -->
        <div class="image-wrapper" id="graphic-area">
            <img id="display-gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbW9scXF6YTN0Y3I2bW93ZzB4N29wY3RxamM0bXN6cmN6ZzZsOHZ0dyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3RsPTE/KztT2c4Y8m7xcEMYUt/giphy.gif" alt="Cute graphic interaction">
        </div>

        <!-- Dynamic Header Text -->
        <h1 id="question-text">Would you be my Tagalog teacher? 🥺🇵🇭</h1>

        <!-- Stage 1: Proposal Buttons -->
        <div class="btn-group" id="action-controls">
            <button id="btn-yes" class="btn">Yes</button>
            <button id="btn-no" class="btn">Hindi</button>
        </div>

        <!-- Stage 2: Hidden Scheduling Form (Revealed via JS) -->
        <form class="booking-form hidden" id="lesson-form">
            <div class="form-group">
                <label for="student-name">Your Name</label>
                <input type="text" id="student-name" placeholder="Enter your name" required>
            </div>
            
            <div class="form-group">
                <label for="contact-info">Contact Details (Discord, Email, or Phone)</label>
                <input type="text" id="contact-info" placeholder="How should I reach out?" required>
            </div>

            <div class="form-group">
                <label for="lesson-day">Preferred Day</label>
                <select id="lesson-day" required>
                    <option value="" disabled selected>Select a day</option>
                    <option value="Monday">Monday</option>
                    <option value="Tuesday">Tuesday</option>
                    <option value="Wednesday">Wednesday</option>
                    <option value="Thursday">Thursday</option>
                    <option value="Friday">Friday</option>
                    <option value="Saturday">Saturday</option>
                    <option value="Sunday">Sunday</option>
                </select>
            </div>

            <div class="form-group">
                <label for="lesson-time">Preferred Time Slot</label>
                <select id="lesson-time" required>
                    <option value="" disabled selected>Select a time</option>
                    <option value="Morning">Morning (9:00 AM - 12:00 PM)</option>
                    <option value="Afternoon">Afternoon (12:00 PM - 5:00 PM)</option>
                    <option value="Evening">Evening (5:00 PM - 9:00 PM)</option>
                </select>
            </div>

            <button type="submit" class="btn-submit">Confirm Schedule 🚀</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
